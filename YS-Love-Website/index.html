<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y ❤️ Shiksha</title>
<style>
body{
margin:0;height:100vh;overflow:hidden;
background:url('photo1.jpeg') center/cover no-repeat;
font-family:Arial,sans-serif;color:white;
transition:background-image 1s;
}
.overlay{
height:100vh;background:rgba(0,0,0,.35);
display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;
}
h1{font-size:48px;margin:10px}
#question{font-size:32px;margin:10px}
button{
padding:14px 28px;border:none;border-radius:30px;
font-size:20px;cursor:pointer;margin:10px;
}
#yesBtn{background:#ff4081;color:white}
#noBtn{background:#666;color:white;position:absolute}
#ageBox{
position:fixed;bottom:20px;left:20px;
font-size:24px;font-weight:bold;
background:rgba(0,0,0,.45);
padding:12px 18px;border-radius:15px;
}
.balloon{
position:fixed;font-size:40px;
animation:pop 1.5s forwards;
}
@keyframes pop{
0%{transform:translateY(0) scale(1);opacity:1}
100%{transform:translateY(-200px) scale(2);opacity:0}
}
</style>
</head>
<body>
<div class="overlay">
<h1>Y ❤️ Shiksha</h1>
<h2 id="question">Do you love me, Shiksha? ❤️</h2>
<div>
<button id="yesBtn" onclick="nextQuestion()">Yes ❤️</button>
<button id="noBtn">No 💔</button>
</div>
</div>

<div id="ageBox"></div>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const questions=[
"Do you love me, Shiksha? ❤️",
"Will you stay with me forever? 🥰",
"Can I always make you smile? 😊",
"Will you be my special person? 💕",
"Can we create beautiful memories together? 🌹",
"Y ❤️ Shiksha Forever ♾️"
];

let q=0;
function balloons(){
for(let i=0;i<20;i++){
const b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*window.innerWidth+"px";
b.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(b);
setTimeout(()=>b.remove(),1500);
}
}

function nextQuestion(){
document.getElementById("bgMusic").play().catch(()=>{});
balloons();
q++;
if(q<questions.length){
document.getElementById("question").innerText=questions[q];
}else{
document.body.innerHTML=`<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff758c,#ff7eb3);color:white">
<h1>🎉 Y ❤️ Shiksha Forever 🎉</h1>
<h2>I Love You ❤️</h2></div>`;
}
}

const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
noBtn.style.left=Math.random()*(window.innerWidth-120)+"px";
noBtn.style.top=Math.random()*(window.innerHeight-80)+"px";
});

const photos=[];
for(let i=1;i<=20;i++) photos.push(`photo${i}.jpeg`);
let p=0;
setInterval(()=>{
p=(p+1)%photos.length;
document.body.style.backgroundImage=`url('${photos[p]}')`;
},3000);

function updateAge(){
const birth=new Date("2008-01-03T00:00:00");
const now=new Date();
let years=now.getFullYear()-birth.getFullYear();
let months=now.getMonth()-birth.getMonth();
let days=now.getDate()-birth.getDate();
if(days<0){months--;days+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
if(months<0){years--;months+=12;}
document.getElementById("ageBox").innerHTML=
`🎂 Shiksha Age<br>${years} Years ${months} Months ${days} Days<br>${now.getHours()} Hours ${now.getMinutes()} Minutes ${now.getSeconds()} Seconds`;
}
setInterval(updateAge,1000);
updateAge();
</script>
</body>
</html>
